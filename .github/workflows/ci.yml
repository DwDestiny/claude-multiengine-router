# Input: GitHub-hosted runners plus repository tests. Output: cross-platform CI verdict.
# Pos: Phase 3 release-readiness workflow for syntax, tests, dry-run, and leak gates.

name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check Unix shell scripts
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n install.sh uninstall.sh tests/test_install_temp_home.sh tests/test_uninstall_temp_home.sh

      - name: Syntax check PowerShell scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @("install.ps1", "uninstall.ps1")) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Error "PowerShell syntax errors in ${file}:"
              $errors | ForEach-Object { Write-Error $_.Message }
              $failed = $true
            }
          }
          if ($failed) {
            throw "PowerShell syntax check failed."
          }

      - name: Python installer tests
        run: python tests/test_python_installer.py

      - name: Install Grok MCP test dependencies
        run: python -m pip install -r mcp-servers/grok-mcp/requirements.txt

      - name: Grok MCP unittest
        run: python -m unittest discover -s mcp-servers/grok-mcp -p 'test_*.py'

      - name: Installer dry-run with fake CLIs and temp home
        run: python tests/ci_install_dry_run.py

      - name: Private leak gate
        run: python tests/private_leak_gate.py .
